title: PowerShell Encoded Command Execution
id: bbbbbbbb-cccc-dddd-eeee-ffffffffffff
status: stable
description: Detects PowerShell processes invoked with the -EncodedCommand argument, which adversaries use to obfuscate malicious scripts at the command line.
date: 2024/03/15
modified: 2024/11/01
tags:
  - attack.execution
  - attack.t1059.001
detection:
  selection:
    CommandLine|contains: '-EncodedCommand'
  condition: selection
